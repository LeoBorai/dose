name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: 6.2.0

      - name: Build dose.app
        run: |
          # Should replicate ./Scripts/build.sh
          swift build -c release
          mkdir -p dist/dose.app/Contents/MacOS
          mkdir -p dist/dose.app/Contents/Resources
          mv .build/release/dose dist/dose.app/Contents/MacOS/dose
          chmod +x dist/dose.app/Contents/MacOS/dose
          cp ./Info.plist dist/dose.app/Contents/Info.plist

      - name: Generate release tag
        id: tag
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "value=${DATE}-${SHORT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Compress artifact
        run: zip -r dose.zip ./dist/dose.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          files: dose.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
